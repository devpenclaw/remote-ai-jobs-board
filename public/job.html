<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Details | RemoteAIJobs</title>
  <link rel="icon" href="/favicon.svg">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">
        <span class="logo-icon">🤖</span>
        <span>Remote<span class="accent">AI</span>Jobs</span>
      </a>
      <div class="nav-links">
        <a href="/jobs.html" class="nav-link">Browse Jobs</a>
        <a href="/post.html" class="btn btn-primary">Post a Job</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <a href="/jobs.html" class="back-link">← Back to Jobs</a>
    
    <div class="job-detail" id="jobDetail">
      <div class="job-detail-header">
        <span class="company-logo-lg" id="companyLogo">🤖</span>
        <div>
          <h1 id="jobTitle">Loading...</h1>
          <p class="company-lg" id="companyName"></p>
        </div>
      </div>
      
      <div class="job-detail-meta">
        <span class="meta-badge" id="salaryRange">$--k</span>
        <span class="meta-badge" id="experienceLevel">--</span>
        <span class="meta-badge">📍 <span id="location">Remote</span></span>
        <span class="meta-badge" id="companySize">--</span>
      </div>
      
      <div class="job-section">
        <h2>About the Role</h2>
        <p id="jobDescription"></p>
      </div>
      
      <div class="job-section">
        <h2>Requirements</h2>
        <p id="jobRequirements"></p>
      </div>
      
      <div class="job-section">
        <h2>Tags</h2>
        <div class="job-tags" id="jobTags"></div>
      </div>
      
      <div class="job-apply">
        <a href="#" class="btn btn-primary btn-lg" id="applyBtn" target="_blank">Apply Now</a>
        <button class="btn btn-secondary" id="saveJobBtn">Save Job</button>
        <button class="btn btn-secondary" id="shareBtn">Share</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">
          <span class="logo-icon">🤖</span>
          <span>Remote<span class="accent">AI</span>Jobs</span>
        </div>
        <div class="footer-links">
          <a href="/">Home</a>
          <a href="/jobs.html">Browse Jobs</a>
          <a href="/post.html">Post a Job</a>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© 2024 RemoteAIJobs. Built for the AI community.</p>
      </div>
    </div>
  </footer>

  <script src="/app.js"></script>
  <script>
    // Track page view
    fetch('/api/track/pageview', { method: 'POST' });
    
    const urlParams = new URLSearchParams(window.location.search);
    const jobId = urlParams.get('id');
    
    if (!jobId) {
      window.location.href = '/jobs.html';
    }
    
    fetch('/api/jobs/' + jobId)
      .then(r => r.json())
      .then(job => {
        if (job.error) {
          window.location.href = '/jobs.html';
          return;
        }
        
        // Track job view
        trackJobView(job.id);
        
        document.getElementById('companyLogo').textContent = job.company_logo || '🤖';
        document.getElementById('jobTitle').textContent = job.title;
        document.getElementById('companyName').textContent = job.company;
        document.getElementById('salaryRange').textContent = job.salary_min ? '$' + (job.salary_min / 1000).toFixed(0) + 'k+' : 'Competitive';
        document.getElementById('experienceLevel').textContent = job.experience_level || 'Any Level';
        document.getElementById('location').textContent = job.location || 'Remote';
        document.getElementById('companySize').textContent = job.company_size || 'Unknown';
        document.getElementById('jobDescription').textContent = job.description;
        document.getElementById('jobRequirements').textContent = job.requirements;
        document.getElementById('applyBtn').href = job.apply_url;
        
        document.title = job.title + ' | RemoteAIJobs';
        
        // Tags
        document.getElementById('jobTags').innerHTML = job.tags.map(tag => 
          '<a href="/jobs.html?tag=' + encodeURIComponent(tag) + '" class="tag">' + tag + '</a>'
        ).join('');
        
        // Save job button
        document.getElementById('saveJobBtn').addEventListener('click', () => {
          const user = checkAuth();
          if (!user) {
            alert('Please sign in to save jobs');
            return;
          }
          alert('Job saved!');
        });
        
        // Share button
        document.getElementById('shareBtn').addEventListener('click', () => {
          if (navigator.share) {
            navigator.share({
              title: job.title + ' at ' + job.company,
              url: window.location.href
            });
          } else {
            navigator.clipboard.writeText(window.location.href);
            alert('Link copied!');
          }
        });
      });
  </script>
</body>
</html>
